<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сновидец — Профиль</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #000000;
  --purple: #8B5CF6;
  --teal:   #14B8A6;
  --amber:  #F59E0B;
  --glass:  rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.08);
  --text:   rgba(255,255,255,0.88);
  --muted:  rgba(255,255,255,0.35);
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ── Phone shell ── */
.phone {
  width: 320px; height: 693px;
  background: #000; border-radius: 44px; overflow: hidden;
  border: 1.5px solid rgba(255,255,255,0.10);
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.8),
    0 32px 80px rgba(0,0,0,0.8),
    inset 0 1px 0 rgba(255,255,255,0.06);
  position: relative; isolation: isolate;
}
.phone-inner {
  width: 390px; height: 844px;
  transform: scale(calc(320/390));
  transform-origin: top left;
  position: relative;
}

/* ── Atmosphere ── */
.nebula { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
.nebula::before {
  content: ''; position: absolute; top: -80px; right: -60px;
  width: 320px; height: 320px;
  background: radial-gradient(ellipse, rgba(139,92,246,0.14) 0%, transparent 68%);
  border-radius: 50%;
}
.nebula::after {
  content: ''; position: absolute; bottom: 200px; left: -80px;
  width: 260px; height: 260px;
  background: radial-gradient(ellipse, rgba(20,184,166,0.07) 0%, transparent 70%);
  border-radius: 50%;
}

/* ── Dynamic Island & Status Bar ── */
.dynamic-island {
  position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  width: 126px; height: 37px; background: #000; border-radius: 20px; z-index: 20;
}
.status-bar {
  position: relative; z-index: 10; height: 54px; padding: 16px 28px 0;
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.status-bar .time { font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.85); letter-spacing: -0.3px; }
.status-icons { display: flex; align-items: center; gap: 6px; }

/* ── Layout ── */
.phone-layout { display: flex; flex-direction: column; height: 844px; position: relative; }
.scroll-area {
  flex: 1; overflow-y: auto; min-height: 0;
  padding: 6px 22px 112px;
  scrollbar-width: none; -ms-overflow-style: none;
}
.scroll-area::-webkit-scrollbar { display: none; }

/* ── Bottom Nav ── */
.bottom-nav {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
  padding: 0 4px 34px;
  background: rgba(0,0,0,0.88); backdrop-filter: blur(24px);
  border-top: 1px solid rgba(255,255,255,0.07);
}
.nav-inner { display: flex; justify-content: space-around; align-items: center; padding-top: 8px; }
.nav-item-s {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 5px 8px; border-radius: 14px; flex: 1;
}
.nav-icon-wrap-s {
  width: 32px; height: 26px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
}
.nav-label-s { font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.28); white-space: nowrap; }
.nav-active .nav-icon-wrap-s { background: rgba(139,92,246,0.2); }
.nav-active .nav-label-s { color: #8B5CF6; font-weight: 600; }

/* ════════════════════════════════
   SCREEN — PROFILE
════════════════════════════════ */

/* ── Hero card ── */
.prof-hero {
  position: relative; overflow: hidden;
  border-radius: 28px;
  background: rgba(139,92,246,0.08);
  border: 1px solid rgba(139,92,246,0.18);
  padding: 24px 20px 20px;
  margin-bottom: 12px;
  display: flex; flex-direction: column; align-items: center;
}
/* top shimmer line */
.prof-hero::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(139,92,246,0.55), transparent);
}
/* subtle radial glow behind avatar */
.prof-hero::after {
  content: ''; position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
  width: 200px; height: 160px;
  background: radial-gradient(ellipse, rgba(139,92,246,0.18) 0%, transparent 70%);
  pointer-events: none;
}

.prof-avatar-wrap {
  position: relative; z-index: 1; margin-bottom: 14px;
}
.prof-avatar {
  width: 76px; height: 76px; border-radius: 50%;
  background: linear-gradient(145deg, rgba(139,92,246,0.55), rgba(99,102,241,0.4));
  border: 2px solid rgba(139,92,246,0.45);
  display: flex; align-items: center; justify-content: center;
  box-shadow:
    0 0 0 5px rgba(139,92,246,0.09),
    0 8px 24px rgba(139,92,246,0.25);
}

.prof-name {
  font-size: 22px; font-weight: 800; color: #fff;
  letter-spacing: -0.5px; line-height: 1; margin-bottom: 5px;
  position: relative; z-index: 1;
}
.prof-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 12px; border-radius: 99px;
  background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.25);
  font-size: 11px; font-weight: 600; color: rgba(196,181,253,0.8);
  position: relative; z-index: 1; margin-bottom: 18px;
}
.prof-badge-dot {
  width: 5px; height: 5px; border-radius: 50%; background: rgba(139,92,246,0.7);
}


/* ── Section label ── */
.section-label {
  font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase;
  color: rgba(255,255,255,0.25); margin-bottom: 10px; margin-top: 20px;
  padding-left: 2px;
}

/* ── Settings card ── */
.settings-card {
  border-radius: 22px; overflow: hidden;
  background: var(--glass); border: 1px solid var(--border);
}
.settings-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 15px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.055);
  transition: background 0.15s ease; cursor: pointer;
}
.settings-row:last-child { border-bottom: none; }
.settings-row:hover { background: rgba(255,255,255,0.03); }

.settings-row-left { display: flex; align-items: center; gap: 12px; }
.settings-icon {
  width: 34px; height: 34px; border-radius: 11px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.settings-icon.bell { background: rgba(139,92,246,0.14); }
.settings-icon.moon { background: rgba(99,102,241,0.14); }
.settings-icon.lang { background: rgba(20,184,166,0.12); }
.settings-icon.export { background: rgba(245,158,11,0.12); }
.settings-icon.guide  { background: rgba(34,197,94,0.12); }

.settings-label { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.82); }
.settings-sub { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 1.5px; }

/* ── Toggle switch ── */
.toggle {
  width: 44px; height: 26px; border-radius: 99px;
  position: relative; flex-shrink: 0;
}
.toggle.off {
  background: rgba(255,255,255,0.09); border: 1px solid rgba(255,255,255,0.11);
}
.toggle.on {
  background: linear-gradient(90deg, #8B5CF6, #6366F1);
  border: 1px solid rgba(139,92,246,0.45);
}
.toggle-knob {
  position: absolute; top: 4px;
  width: 18px; height: 18px; border-radius: 50%;
  background: #fff; box-shadow: 0 1px 5px rgba(0,0,0,0.35);
}
.toggle.off .toggle-knob { left: 4px; }
.toggle.on  .toggle-knob { left: calc(100% - 22px); }
.toggle.disabled { opacity: 0.4; cursor: default; }

/* Arrow for nav rows */
.settings-arrow {
  width: 18px; height: 18px; opacity: 0.22;
  display: flex; align-items: center; justify-content: center;
}

/* ── Logout button ── */
.btn-logout {
  margin-top: 20px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; height: 52px; border-radius: 18px;
  background: rgba(239,68,68,0.07); border: 1.5px solid rgba(239,68,68,0.28);
  font-size: 14px; font-weight: 600; color: rgba(252,165,165,0.85);
  cursor: pointer; transition: background 0.15s ease;
}
.btn-logout:hover { background: rgba(239,68,68,0.12); }

/* ── App version ── */
.prof-version {
  text-align: center; margin-top: 16px;
  font-size: 10px; color: rgba(255,255,255,0.15); font-weight: 500;
}

/* Mobile fullscreen override */
@media (max-width: 500px) {
  body { align-items: flex-start; }
  .phone {
    width: 100vw !important;
    height: 100vh !important;
    border-radius: 0 !important;
    border: none !important;
    box-shadow: none !important;
  }
  .phone-inner {
    width: 100vw !important;
    height: 100vh !important;
    transform: none !important;
  }
  .phone-layout {
    height: 100vh !important;
  }
  .dynamic-island { display: none; }
}

</style>
</head>
<body>

<script>
(function(){
  var map = {
    'Дневник':      '3_diary',
    'Визуализация': '6_viz',
    'Аналитика':    '7_analytics',
    'Профиль':      '8_profile'
  };
  // Bottom nav clicks
  document.querySelectorAll('.nav-item-s').forEach(function(item){
    item.style.cursor = 'pointer';
    var label = item.querySelector('.nav-label-s');
    if(label){
      var txt = label.textContent.trim();
      if(map[txt]){
        item.addEventListener('click', function(){ parent.goTo(map[txt]); });
      }
    }
  });
  
  // Logout → login
  document.querySelectorAll('button, [class*="logout"], [class*="exit"]').forEach(function(btn){
    var txt = btn.textContent.trim().toLowerCase();
    if(txt.includes('выйти') || txt.includes('выход')){
      btn.style.cursor = 'pointer';
      btn.addEventListener('click', function(){ parent.goTo('2_login'); });
    }
  });

})();
</script>
